<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<title>isiam store — Control Center</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* Minified CSS for Railway performance */
:root{--bg:#1e1f22;--card:#2b2d31;--accent:#5865f2;--fg:#f2f3f5;--green:#23a55a;--border:#3f4147;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--fg);margin:0;padding:20px;display:flex;justify-content:center;}
.panel{background:var(--card);width:100%;max-width:1200px;border-radius:12px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:15px;font-size:20px;font-weight:bold;}
.header img {width:40px;height:40px;border-radius:50%;}
.tabs{display:flex;gap:10px;padding:15px;background:rgba(0,0,0,0.1);overflow-x:auto;}
.tab{padding:10px 20px;cursor:pointer;background:var(--bg);border-radius:6px;transition:0.2s;}
.tab:hover, .tab.active{background:var(--accent);color:#fff;}
.content{padding:20px;display:none;}
.content.active{display:block;}
input, select, textarea {width:100%;padding:10px;margin-bottom:15px;background:var(--bg);border:1px solid var(--border);color:#fff;border-radius:6px;box-sizing:border-box;}
button{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
button:hover{opacity:0.8;}
.btn-green{background:var(--green);}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{padding:12px;text-align:left;border-bottom:1px solid var(--border);}
.img-upload{border:2px dashed var(--border);padding:30px;text-align:center;cursor:pointer;margin-bottom:15px;}
.img-thumbs img {width:60px;height:60px;object-fit:cover;border-radius:5px;margin:5px;}
</style>
</head>
<body>

<div class="panel">
  <div class="header">
    <img src="0e3f41e7-3aa3-40c4-9a1d-e3d05cebe709-profile_image-70x70.png" alt="logo">
    isiam store Dashboard
  </div>
  
  <div class="tabs">
    <div class="tab active" onclick="switchTab('add')">Post New Account</div>
    <div class="tab" onclick="switchTab('tickets'); loadTickets()">Tickets & Payments</div>
    <div class="tab" onclick="switchTab('settings'); loadSettings()">Settings</div>
  </div>

  <!-- Add Account -->
  <div class="content active" id="add">
    <h3>Post Product to Discord</h3>
    <div class="img-upload" onclick="document.getElementById('imgIn').click()">
      <i class="fas fa-images fa-2x"></i><br>Click to select multiple images (Collage Embed)
      <input type="file" id="imgIn" multiple accept="image/*" style="display:none" onchange="handleImgs(event)">
    </div>
    <div class="img-thumbs" id="imgThumbs"></div>

    <div style="display:flex; gap:10px;">
      <input type="text" id="tEn" placeholder="Product Title (e.g., Call of Duty: Warzone Acc)">
      <input type="number" id="price" placeholder="Price ($)">
    </div>
    <select id="game">
      <option>Call of Duty</option><option>Hardware/Controllers</option><option>GTA V</option><option>Other</option>
    </select>
    
    <div style="display:flex; gap:10px;">
      <input type="text" id="email" placeholder="Account Email (Hidden until purchase)">
      <input type="text" id="pass" placeholder="Account Password (Hidden until purchase)">
    </div>
    
    <button onclick="postAccount()"><i class="fas fa-paper-plane"></i> Post to Store</button>
  </div>

  <!-- Tickets & Payments -->
  <div class="content" id="tickets">
    <h3>Pending Payments</h3>
    <table>
      <thead><tr><th>Order ID</th><th>Customer</th><th>Product</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="payTb"></tbody>
    </table>
  </div>

  <!-- Settings -->
  <div class="content" id="settings">
    <h3>System Configuration</h3>
    <label>Discord Accounts Channel ID</label><input type="text" id="sAccCh">
    <label>Discord Tickets Category ID</label><input type="text" id="sTickCat">
    <label>STC Pay Number</label><input type="text" id="sStc">
    <button onclick="saveSettings()">Save Configuration</button>
  </div>
</div>

<script>
const API = '';
let curImgs = [];

function switchTab(id) {
  document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function handleImgs(e) {
  Array.from(e.target.files).forEach(f => {
    const reader = new FileReader();
    reader.onload = ev => { curImgs.push(ev.target.result); renderThumbs(); };
    reader.readAsDataURL(f);
  });
}

function renderThumbs() {
  document.getElementById('imgThumbs').innerHTML = curImgs.map(i => `<img src="${i}">`).join('');
}

async function postAccount() {
  const data = {
    titleEn: document.getElementById('tEn').value,
    price: document.getElementById('price').value,
    game: document.getElementById('game').value,
    email: document.getElementById('email').value,
    pass: document.getElementById('pass').value,
    images: curImgs
  };
  await fetch(API + '/api/accounts', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
  alert('Posted successfully!');
  curImgs = []; renderThumbs();
}

async function loadTickets() {
  const pays = await (await fetch(API + '/api/payments')).json();
  document.getElementById('payTb').innerHTML = pays.map(p => `
    <tr><td>${p.id}</td><td>${p.userName}</td><td>${p.accountTitle}</td><td>$${p.amount}</td><td>${p.status}</td>
    <td>${p.status === 'Waiting Review' ? `<button class="btn-green" onclick="approve('${p.id}')">Approve & Deliver</button>` : '-'}</td></tr>
  `).join('');
}

async function approve(id) {
  await fetch(API + '/api/payments/' + id + '/approve', { method: 'POST' });
  alert('Approved! Credentials sent in private ticket and ticket will auto-close.');
  loadTickets();
}

async function loadSettings() {
  const s = await (await fetch(API + '/api/settings')).json();
  document.getElementById('sAccCh').value = s.accountsChannelId;
  document.getElementById('sTickCat').value = s.ticketCategoryId;
  document.getElementById('sStc').value = s.stcPay.number;
}

async function saveSettings() {
  await fetch(API + '/api/settings', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({
    accountsChannelId: document.getElementById('sAccCh').value,
    ticketCategoryId: document.getElementById('sTickCat').value,
    stcPay: { number: document.getElementById('sStc').value }
  })});
  alert('Settings Saved');
}
</script>
</body>
</html>
