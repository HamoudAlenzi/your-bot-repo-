<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>isiam store — Payment Center</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg-deep:#0a0a0f;--bg:#12121a;--bg-elev:#1a1a25;--bg-card:#1e1e2e;--bg-input:#15151f;--border:#2a2a3a;--border-light:#3a3a55;--fg:#f5f5fa;--fg-muted:#9b9bb0;--accent:#9b59ff;--accent-2:#c084fc;--accent-dim:rgba(155,89,255,.15);--gold:#f0c040;--green:#3ddc84;--red:#ff5a6e;--yellow:#ffb547;--radius:12px;--shadow:0 10px 40px rgba(0,0,0,.5)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo','Inter',sans-serif;background:var(--bg-deep);color:var(--fg);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 15% 20%,rgba(155,89,255,.08),transparent 50%),radial-gradient(circle at 85% 80%,rgba(240,192,64,.06),transparent 50%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
input,textarea,select,button{font-family:inherit}

/* LOGIN */
.login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:1000;background:radial-gradient(circle at center,var(--bg-elev),var(--bg-deep))}
.login-card{background:rgba(30,30,46,.7);backdrop-filter:blur(20px);border:1px solid var(--border-light);border-radius:24px;padding:48px 40px;width:420px;max-width:90vw;box-shadow:var(--shadow)}
.login-logo{width:80px;height:80px;margin:0 auto 20px;border-radius:20px;overflow:hidden}
.login-logo img{width:100%;height:100%;object-fit:cover}
.login-title{text-align:center;font-size:26px;font-weight:800;margin-bottom:4px;background:linear-gradient(135deg,#fff,var(--accent-2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{text-align:center;color:var(--fg-muted);font-size:13px;margin-bottom:30px}
.input-group{margin-bottom:18px}
.input-group label{display:block;font-size:12px;color:var(--fg-muted);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.input-group input{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--fg);font-size:14px;outline:none;transition:.18s}
.input-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.btn-login{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(155,89,255,.4)}
.btn-login:hover{transform:translateY(-2px)}
.login-error{color:var(--red);font-size:13px;text-align:center;margin-top:12px;min-height:18px}

/* APP */
.app{display:none;height:100vh;overflow:hidden;position:relative;z-index:1}
.sidebar{width:260px;background:rgba(18,18,26,.85);backdrop-filter:blur(20px);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:22px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.sidebar-logo{width:42px;height:42px;border-radius:12px;overflow:hidden;flex-shrink:0}
.sidebar-logo img{width:100%;height:100%;object-fit:cover}
.sidebar-brand h1{font-size:16px;font-weight:800}
.sidebar-brand span{font-size:11px;color:var(--fg-muted);text-transform:uppercase;letter-spacing:1px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;color:var(--fg-muted);font-size:14px;font-weight:500;cursor:pointer;transition:.18s;margin:2px 10px}
.nav-item:hover{background:var(--bg-hover);color:var(--fg)}
.nav-item.active{background:var(--accent-dim);color:var(--fg);box-shadow:inset 3px 0 0 var(--accent)}
.nav-item i{width:18px;text-align:center}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:64px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;background:rgba(18,18,26,.7);backdrop-filter:blur(20px);gap:16px}
.topbar h2{font-size:18px;font-weight:700;flex:1}
.content{flex:1;overflow-y:auto;padding:24px}
.page{display:none}.page.active{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
.stat-card.green::before{background:var(--green)}.stat-card.gold::before{background:var(--gold)}.stat-card.red::before{background:var(--red)}.stat-card.yellow::before{background:var(--yellow)}
.stat-label{font-size:11px;color:var(--fg-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600}
.stat-value{font-size:28px;font-weight:800}
.stat-icon{position:absolute;top:18px;left:18px;width:40px;height:40px;border-radius:12px;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px}

.panel-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.panel-card h3{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge.Pending,.badge.Waiting,.badge['Awaiting Amount']{background:rgba(255,181,71,.15);color:var(--yellow)}
.badge.Approved{background:rgba(61,220,132,.15);color:var(--green)}
.badge.Rejected,.badge.Closed{background:rgba(255,90,110,.15);color:var(--red)}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--bg-elev);border:1px solid var(--border);color:var(--fg);padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:.18s}
.btn:hover{background:var(--bg-hover);border-color:var(--border-light)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));border:none;color:#fff;box-shadow:0 4px 14px rgba(155,89,255,.3)}
.btn-success{background:rgba(61,220,132,.15);border:1px solid var(--green);color:var(--green)}
.btn-danger{background:rgba(255,90,110,.15);border:1px solid var(--red);color:var(--red)}
.btn-sm{padding:6px 12px;font-size:12px}
.data-table{width:100%;border-collapse:collapse}
.data-table th{text-align:right;font-size:11px;color:var(--fg-muted);text-transform:uppercase;padding:10px 12px;border-bottom:1px solid var(--border)}
.data-table td{padding:12px;border-bottom:1px solid var(--border);font-size:13px}
.form-field{margin-bottom:14px}
.form-field label{display:block;font-size:11px;color:var(--fg-muted);text-transform:uppercase;margin-bottom:6px;font-weight:600}
.form-field input,.form-field select,.form-field textarea{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--fg);font-size:13px;outline:none}
.form-field input:focus,.form-field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.method-toggle{display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg-elev);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:.18s}
.method-toggle:hover{border-color:var(--border-light)}
.method-toggle.enabled{border-color:var(--accent);background:var(--accent-dim)}
.method-toggle .emoji{font-size:24px}
.method-toggle .info{flex:1}
.method-toggle .info b{display:block;font-size:14px}
.method-toggle .info span{font-size:11px;color:var(--fg-muted)}
.method-toggle .switch{width:44px;height:24px;border-radius:12px;background:var(--border);position:relative;transition:.18s}
.method-toggle .switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--fg-muted);transition:.18s}
.method-toggle.enabled .switch{background:var(--accent)}
.method-toggle.enabled .switch::after{left:22px;background:#fff}
.toast{position:fixed;top:20px;right:20px;z-index:2000;background:var(--bg-card);border:1px solid var(--border-light);border-left:4px solid var(--accent);padding:14px 18px;border-radius:10px;box-shadow:var(--shadow);min-width:280px;font-size:13px;animation:slideIn .3s}
.toast.success{border-left-color:var(--green)}.toast.error{border-left-color:var(--red)}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.empty{text-align:center;padding:48px;color:var(--fg-muted)}
.empty i{font-size:48px;margin-bottom:12px;color:var(--fg-dim)}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo"><img src="logo.png" alt="isiam store"></div>
    <div class="login-title">isiam store</div>
    <div class="login-sub">Payment Center — GCC + PayPal</div>
    <form onsubmit="return doLogin(event)">
      <div class="input-group"><label>Password</label><input type="password" id="loginPassword" required></div>
      <button type="submit" class="btn-login" id="loginBtn">🔓 Unlock</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>
</div>

<div class="app" id="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo"><img src="logo.png" alt=""></div>
      <div class="sidebar-brand"><h1>isiam store</h1><span>Payment Center</span></div>
    </div>
    <div style="flex:1;padding:14px 0">
      <div class="nav-item active" data-page="dashboard"><i class="fa-solid fa-chart-line"></i> لوحة التحكم</div>
      <div class="nav-item" data-page="payments"><i class="fa-solid fa-money-bill-wave"></i> المدفوعات <span class="badge" id="payBadge" style="display:none;margin-right:auto;background:var(--yellow);color:#000">0</span></div>
      <div class="nav-item" data-page="methods"><i class="fa-solid fa-credit-card"></i> طرق الدفع</div>
      <div class="nav-item" data-page="settings"><i class="fa-solid fa-gear"></i> الإعدادات</div>
      <div class="nav-item" data-page="logs"><i class="fa-solid fa-list"></i> السجلات</div>
    </div>
    <div style="padding:14px">
      <div id="botStatus" style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg-elev);border-radius:10px;font-size:12px">
        <div id="botDot" style="width:8px;height:8px;border-radius:50%;background:var(--green)"></div>
        <span id="botStatusText">Bot Online</span>
      </div>
      <button class="btn btn-sm" style="width:100%;margin-top:8px" onclick="doLogout()"><i class="fa-solid fa-sign-out-alt"></i> خروج</button>
    </div>
  </aside>
  <div class="main">
    <header class="topbar">
      <h2 id="pageTitle">لوحة التحكم</h2>
      <button class="btn btn-primary btn-sm" onclick="postToDiscord()"><i class="fa-solid fa-paper-plane"></i> نشر طرق الدفع</button>
    </header>
    <div class="content" id="content"></div>
  </div>
</div>

<div id="toastContainer"></div>

<script>
const API='/api';let SESSION=localStorage.getItem('isiam_session')||'';let CURRENT_PAGE='dashboard';let CACHE={stats:{},payments:[],settings:{},logs:[]};
const GCC_METHODS=[
  {id:'stcpay',label:'STC Pay',emoji:'📱',region:'Saudi Arabia'},
  {id:'applepay',label:'Apple Pay',emoji:'🍎',region:'GCC'},
  {id:'mada',label:'Mada',emoji:'💳',region:'Saudi Arabia'},
  {id:'urpay',label:'Urpay',emoji:'💸',region:'Saudi Arabia'},
  {id:'tabby',label:'Tabby (BNPL)',emoji:'🟢',region:'GCC'},
  {id:'tamara',label:'Tamara (BNPL)',emoji:'🟣',region:'GCC'},
  {id:'paypal',label:'PayPal',emoji:'🅿️',region:'International'},
  {id:'alrajhi',label:'AlRajhi Bank',emoji:'🏦',region:'Saudi Arabia'},
  {id:'snb',label:'SNB Bank',emoji:'🏛️',region:'Saudi Arabia'},
  {id:'nbd',label:'Emirates NBD',emoji:'🏙️',region:'UAE'}
];

async function api(ep,opts={}){const r=await fetch(API+'/'+ep,{method:opts.method||'GET',headers:{'Content-Type':'application/json','x-session':SESSION,...(opts.headers||{})},body:opts.body||undefined});if(r.status===401){showLogin();throw new Error('Unauthorized');}const t=await r.text();try{return JSON.parse(t)}catch{return t}}
function toast(type,msg){const c=document.getElementById('toastContainer');const icons={success:'fa-check',error:'fa-xmark',info:'fa-info'};const t=document.createElement('div');t.className='toast '+type;t.innerHTML=`<i class="fa-solid ${icons[type]||icons.info}"></i> ${msg}`;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)},3000)}
function showLogin(){document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none'}
function showApp(){document.getElementById('loginScreen').style.display='none';document.getElementById('app').style.display='flex';refresh()}
async function doLogin(e){e.preventDefault();const pwd=document.getElementById('loginPassword').value;try{const r=await fetch(API+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})});const d=await r.json();if(r.ok&&d.token){SESSION=d.token;localStorage.setItem('isiam_session',SESSION);showApp()}else{document.getElementById('loginError').textContent=d.error||'Failed'}}catch(e){document.getElementById('loginError').textContent='Connection error'}}
function doLogout(){SESSION='';localStorage.removeItem('isiam_session');showLogin()}

document.querySelectorAll('.nav-item').forEach(item=>{item.addEventListener('click',()=>{document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));item.classList.add('active');CURRENT_PAGE=item.dataset.page;render()})});

async function refresh(){
  try{
    const[stats,payments,settings,logs]=await Promise.all([api('stats'),api('payments'),api('settings'),api('logs')]);
    CACHE={stats,payments,settings,logs};
    document.getElementById('botDot').style.background=stats.botOnline?'var(--green)':'var(--red)';
    document.getElementById('botStatusText').textContent=stats.botOnline?'Bot Online':'Bot Offline';
    const b=document.getElementById('payBadge');
    if(stats.pending>0){b.textContent=stats.pending;b.style.display='inline-flex'}else{b.style.display='none'}
    render();
  }catch(e){if(e.message==='Unauthorized')showLogin()}
}
setInterval(()=>{refresh()},20000);

function render(){
  const titles={dashboard:'لوحة التحكم',payments:'المدفوعات',methods:'طرق الدفع',settings:'الإعدادات',logs:'السجلات'};
  document.getElementById('pageTitle').textContent=titles[CURRENT_PAGE]||'';
  const c=document.getElementById('content');
  if(CURRENT_PAGE==='dashboard')renderDashboard(c);
  else if(CURRENT_PAGE==='payments')renderPayments(c);
  else if(CURRENT_PAGE==='methods')renderMethods(c);
  else if(CURRENT_PAGE==='settings')renderSettings(c);
  else if(CURRENT_PAGE==='logs')renderLogs(c);
}

function renderDashboard(c){
  const s=CACHE.stats;const cur=CACHE.settings.currency||'SAR';
  c.innerHTML=`
    <div class="page active">
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-icon"><i class="fa-solid fa-money-bill"></i></div><div class="stat-label">إجمالي المدفوعات</div><div class="stat-value">${s.totalPayments||0}</div></div>
        <div class="stat-card yellow"><div class="stat-icon"><i class="fa-solid fa-clock"></i></div><div class="stat-label">قيد المراجعة</div><div class="stat-value">${s.pending||0}</div></div>
        <div class="stat-card green"><div class="stat-icon"><i class="fa-solid fa-check"></i></div><div class="stat-label">مكتملة</div><div class="stat-value">${s.approved||0}</div></div>
        <div class="stat-card gold"><div class="stat-icon"><i class="fa-solid fa-coins"></i></div><div class="stat-label">إجمالي المبالغ</div><div class="stat-value">${cur}${(s.totalAmount||0).toFixed(2)}</div></div>
      </div>
      <div class="panel-card">
        <h3><i class="fa-solid fa-credit-card"></i> طرق الدفع المفعلة</h3>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          ${(s.enabledMethods||[]).map(id=>{const m=GCC_METHODS.find(x=>x.id===id);return m?`<span class="badge" style="background:var(--accent-dim);color:var(--accent);padding:6px 14px;font-size:13px">${m.emoji} ${m.label}</span>`:''}).join('')||'<span class="text-muted">لا توجد طرق مفعلة</span>'}
        </div>
      </div>
      <div class="panel-card">
        <h3><i class="fa-solid fa-clock-rotate-left"></i> آخر المدفوعات</h3>
        ${(CACHE.payments||[]).slice(0,5).map(p=>`
          <div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;align-items:center">
            <span class="mono" style="flex:0 0 100px">${p.id}</span>
            <span style="flex:1">${p.userName} — ${p.method}</span>
            <span>${(CACHE.settings.currency||'SAR')}${(p.amount||0).toFixed(2)}</span>
            <span class="badge ${p.status}">${p.status}</span>
          </div>`).join('')||'<div class="empty">لا توجد مدفوعات بعد</div>'}
      </div>
    </div>`;
}

function renderPayments(c){
  const pays=CACHE.payments||[];const cur=CACHE.settings.currency||'SAR';
  c.innerHTML=`
    <div class="page active">
      <div class="panel-card">
        <h3><i class="fa-solid fa-money-bill-wave"></i> المدفوعات (${pays.length})</h3>
        ${pays.length===0?'<div class="empty"><i class="fa-solid fa-inbox"></i><p>لا توجد مدفوعات</p></div>':
        `<table class="data-table">
          <thead><tr><th>رقم العملية</th><th>العميل</th><th>الطريقة</th><th>المبلغ</th><th>الحالة</th><th>التاريخ</th><th>إجراءات</th></tr></thead>
          <tbody>${pays.map(p=>`<tr>
            <td class="mono">${p.id}</td><td>${p.userName||'-'}</td><td>${p.method||'-'}</td>
            <td>${cur}${(p.amount||0).toFixed(2)}</td>
            <td><span class="badge ${p.status}">${p.status}</span></td>
            <td style="font-size:11px">${new Date(p.createdAt).toLocaleString('ar')}</td>
            <td>
              ${p.proofUrl?`<button class="btn btn-sm" onclick="window.open('${p.proofUrl}','_blank')"><i class="fa-solid fa-image"></i></button>`:''}
              ${(p.status!=='Approved'&&p.status!=='Closed')?`
                <button class="btn btn-sm btn-success" onclick="approvePay('${p.id}')"><i class="fa-solid fa-check"></i></button>
                <button class="btn btn-sm btn-danger" onclick="rejectPay('${p.id}')"><i class="fa-solid fa-xmark"></i></button>
              `:''}
            </td></tr>`).join('')}
          </tbody>
        </table>`}
      </div>
    </div>`;
}

function renderMethods(c){
  const s=CACHE.settings;const enabled=s.enabledMethods||[];
  c.innerHTML=`
    <div class="page active">
      <div class="panel-card">
        <h3><i class="fa-solid fa-credit-card"></i> تفعيل/تعطيل طرق الدفع</h3>
        <p style="color:var(--fg-muted);font-size:13px;margin-bottom:16px">اضغط على الطريقة لتفعيلها أو تعطيلها</p>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px">
          ${GCC_METHODS.map(m=>`
            <div class="method-toggle ${enabled.includes(m.id)?'enabled':''}" onclick="toggleMethod('${m.id}')">
              <div class="emoji">${m.emoji}</div>
              <div class="info"><b>${m.label}</b><span>${m.region}</span></div>
              <div class="switch"></div>
            </div>`).join('')}
        </div>
      </div>
      <div class="panel-card">
        <h3><i class="fa-solid fa-edit"></i> إعدادات طرق الدفع</h3>
        <div id="methodConfigs">
          ${enabled.map(id=>{const m=GCC_METHODS.find(x=>x.id===id);const cfg=s[id]||{};return `
            <div style="background:var(--bg-elev);padding:14px;border-radius:10px;margin-bottom:12px;border:1px solid var(--border)">
              <h4 style="margin-bottom:10px">${m.emoji} ${m.label}</h4>
              ${cfg.iban!==undefined?`<div class="form-row"><div class="form-field"><label>IBAN / رقم الحساب</label><input id="cfg_${id}_iban" value="${cfg.iban||''}"></div><div class="form-field"><label>الاسم</label><input id="cfg_${id}_name" value="${cfg.name||''}"></div></div>`:''}
              ${cfg.link!==undefined?`<div class="form-row"><div class="form-field"><label>الرابط</label><input id="cfg_${id}_link" value="${cfg.link||''}"></div><div class="form-field"><label>الاسم</label><input id="cfg_${id}_name" value="${cfg.name||''}"></div></div>`:''}
              ${cfg.number!==undefined?`<div class="form-row"><div class="form-field"><label>الرقم</label><input id="cfg_${id}_number" value="${cfg.number||''}"></div><div class="form-field"><label>الاسم</label><input id="cfg_${id}_name" value="${cfg.name||''}"></div></div>`:''}
            </div>`}).join('')||'<p style="color:var(--fg-muted)">فعّل طرق الدفع أولاً</p>'}
        </div>
        <button class="btn btn-primary" onclick="saveMethodConfigs()"><i class="fa-solid fa-save"></i> حفظ الإعدادات</button>
      </div>
    </div>`;
}

function renderSettings(c){
  const s=CACHE.settings;
  c.innerHTML=`
    <div class="page active">
      <div class="panel-card">
        <h3><i class="fa-solid fa-gear"></i> إعدادات المتجر</h3>
        <div class="form-row"><div class="form-field"><label>اسم المتجر</label><input id="s_storeName" value="${s.storeName||''}"></div><div class="form-field"><label>العملة</label><input id="s_currency" value="${s.currency||'SAR'}"></div></div>
        <div class="form-row-3"><div class="form-field"><label>Payment Channel ID</label><input id="s_payCh" value="${s.paymentChannelId||''}"></div><div class="form-field"><label>Ticket Category ID</label><input id="s_tktCat" value="${s.ticketCategoryId||''}"></div><div class="form-field"><label>Log Channel ID</label><input id="s_logCh" value="${s.logChannelId||''}"></div></div>
        <div class="form-row"><div class="form-field"><label>Owner Discord ID</label><input id="s_owner" value="${s.ownerId||''}"></div><div class="form-field"><label>Auto-close (seconds)</label><input id="s_autoClose" type="number" value="${s.autoCloseSeconds||15}"></div></div>
        <button class="btn btn-primary" onclick="saveSettings()"><i class="fa-solid fa-save"></i> حفظ</button>
      </div>
      <div class="panel-card">
        <h3><i class="fa-solid fa-database"></i> النسخ الاحتياطي والاستعادة</h3>
        <p style="color:var(--fg-muted);font-size:13px;margin-bottom:14px">تصدير بيانات المتجر بالكامل أو استعادتها من ملف</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="window.location.href='/api/backup?session='+SESSION"><i class="fa-solid fa-download"></i> تحميل نسخة احتياطية</button>
          <button class="btn" onclick="document.getElementById('restoreFile').click()"><i class="fa-solid fa-upload"></i> استعادة من ملف</button>
          <input type="file" id="restoreFile" accept=".json" style="display:none" onchange="restoreBackup(event)">
        </div>
      </div>
    </div>`;
}

function renderLogs(c){
  const logs=CACHE.logs||[];
  c.innerHTML=`<div class="page active"><div class="panel-card"><h3><i class="fa-solid fa-list"></i> السجلات</h3>
    ${logs.length===0?'<div class="empty">لا توجد سجلات</div>':logs.map(l=>`<div style="display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="flex:0 0 140px;color:var(--fg-muted)">${new Date(l.time).toLocaleString('ar')}</span><span style="flex:0 0 60px"><span class="badge ${l.level==='ERROR'?'Rejected':l.level==='WARN'?'Pending':'Approved'}">${l.level}</span></span><span>${l.msg}</span></div>`).join('')}
  </div></div>`;
}

async function toggleMethod(id){
  const s=CACHE.settings;const enabled=s.enabledMethods||[];
  const idx=enabled.indexOf(id);
  if(idx>-1)enabled.splice(idx,1);else enabled.push(id);
  await api('settings',{method:'POST',body:JSON.stringify({enabledMethods:enabled})});
  toast('success','تم التحديث');refresh();
}
async function saveMethodConfigs(){
  const s={...CACHE.settings};
  (CACHE.settings.enabledMethods||[]).forEach(id=>{
    const m=GCC_METHODS.find(x=>x.id===id);if(!m)return;const cfg=s[id]||{};
    const ibanEl=document.getElementById('cfg_'+id+'_iban');if(ibanEl)cfg.iban=ibanEl.value;
    const linkEl=document.getElementById('cfg_'+id+'_link');if(linkEl)cfg.link=linkEl.value;
    const numEl=document.getElementById('cfg_'+id+'_number');if(numEl)cfg.number=numEl.value;
    const nameEl=document.getElementById('cfg_'+id+'_name');if(nameEl)cfg.name=nameEl.value;
    s[id]=cfg;
  });
  await api('settings',{method:'POST',body:JSON.stringify(s)});
  toast('success','تم حفظ الإعدادات');refresh();
}
async function saveSettings(){
  const data={storeName:document.getElementById('s_storeName').value,currency:document.getElementById('s_currency').value,paymentChannelId:document.getElementById('s_payCh').value,ticketCategoryId:document.getElementById('s_tktCat').value,logChannelId:document.getElementById('s_logCh').value,ownerId:document.getElementById('s_owner').value,autoCloseSeconds:parseInt(document.getElementById('s_autoClose').value)||15};
  await api('settings',{method:'POST',body:JSON.stringify(data)});
  toast('success','تم حفظ الإعدادات');refresh();
}
async function approvePay(id){if(!confirm('تأكيد الدفع؟'))return;try{await api('payments/'+id+'/approve',{method:'POST'});toast('success','تم التأكيد');refresh()}catch(e){toast('error',e.message)}}
async function rejectPay(id){if(!confirm('رفض الدفع؟'))return;try{await api('payments/'+id+'/reject',{method:'POST'});toast('warn','تم الرفض');refresh()}catch(e){toast('error',e.message)}}
async function postToDiscord(){try{await api('post-payment',{method:'POST'});toast('success','تم النشر في Discord')}catch(e){toast('error',e.message)}}
async function restoreBackup(e){const file=e.target.files[0];if(!file)return;if(!confirm('استعادة من هذا الملف؟ سيتم استبدال البيانات الحالية.'))return;try{const text=await file.text();const data=JSON.parse(text);await api('restore',{method:'POST',body:JSON.stringify(data)});toast('success','تمت الاستعادة');refresh()}catch(err){toast('error','ملف غير صالح')}}

// Init
if(SESSION){fetch(API+'/check-auth',{headers:{'x-session':SESSION}}).then(r=>r.json()).then(d=>{if(d.authenticated)showApp();else showLogin()})}else{showLogin()}
</script>
</body>
</html>
